{{ define "main" }}
    <article class="single-post">
        <h1>{{ .Title }}</h1>
        <div class="post-meta">
            <span>{{ .Date.Format "2006-01-02" }}</span>
        </div>
        {{ if .Params.image }}
            <div class="featured-image">
                <img src="{{ .Params.image }}" alt="{{ .Title }}">
            </div>
        {{ end }}
        <div class="post-body">
            {{ .Content }}
        </div>
    </article>
{{ end }}
